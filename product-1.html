<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Open Graph Tags for Social Link Preview -->
    <meta property="og:title" content="Order placed - Diamond III Starter Pack">
    <meta property="og:description" content="Price: ₹699 | Level: 59 | Rank: Diamond III | Skins: 12 Weapon Skins. Click to view on Thilak Store.">
    <meta property="og:image" content="assets/criminal.png">
    <meta property="og:url" content="product-1.html">
    <meta property="og:type" content="website">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="preview-container">
        <div class="preview-card">
            <img src="assets/criminal.png" alt="Diamond III Starter Pack" class="preview-hero-img">
            
            <div>
                <h1 class="preview-title">Diamond III Starter Pack</h1>
                <div class="preview-price">₹699</div>
            </div>

            <div class="preview-specs-list">
                <div class="preview-spec-item">
                    <span class="preview-spec-label">Level</span>
                    <span class="preview-spec-val">59</span>
                </div>
                <div class="preview-spec-item">
                    <span class="preview-spec-label">Rank</span>
                    <span class="preview-spec-val">Diamond III</span>
                </div>
                <div class="preview-spec-item" style="grid-column: span 2;">
                    <span class="preview-spec-label">Skins & Details</span>
                    <span class="preview-spec-val">12 Weapon Skins</span>
                </div>
            </div>

            <div class="preview-btns">
                <button id="buyWA" class="btn-main" style="width: 100%; gap: 10px;">
                    <i data-lucide="message-circle" style="width: 18px; height: 18px;"></i>
                    Buy on WhatsApp Channel
                </button>
                <a href="index.html#store" class="btn-outline-dark" style="width: 100%; text-align: center;">
                    Back to Store
                </a>
            </div>
        </div>
    </main>

    <div class="toast-box" id="toastBox"></div>

    <script>
        // Init Lucide
        if (typeof lucide !== 'undefined') lucide.createIcons();

        // Toast helper
        function toast(msg) {
            const box = document.getElementById('toastBox');
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerHTML = `<i data-lucide="check-circle"></i><span>${msg}</span>`;
            box.appendChild(t);
            if (typeof lucide !== 'undefined') lucide.createIcons();
            setTimeout(() => { t.classList.add('out'); setTimeout(() => t.remove(), 300); }, 3000);
        }

        const WA_PHONE = '918102098935';
        const title = "Diamond III Starter Pack";
        const price = "699";
        const level = "59";
        const rank = "Diamond III";
        const skins = "12 Weapon Skins";
        const image = "assets/criminal.png";
        
        document.getElementById('buyWA').addEventListener('click', () => {
            toast('Opening WhatsApp Channel...');
            const url = `https://whatsapp.com/channel/0029Vb7mj918qIzzuWZLDc3T`;
            window.open(url, '_blank');
        });
    </script>
</body>
</html>

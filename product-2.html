<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Heroic Cobra MP40 - Thilak Store</title>
    
    <!-- Open Graph Tags for Social Link Preview -->
    <meta property="og:title" content="Order placed - Heroic Cobra MP40">
    <meta property="og:description" content="Price: ₹1,250 | Level: 63 | Rank: Heroic II | Skins: 25+ Gun Skins, 5 Emotes. Click to view on Thilak Store.">
    <meta property="og:image" content="https://thilak.store/assets/cobra.png">
    <meta property="og:url" content="https://thilak.store/product-2.html">
    <meta property="og:type" content="website">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="preview-container">
        <div class="preview-card">
            <img src="assets/cobra.png" alt="Heroic Cobra MP40" class="preview-hero-img">
            
            <div>
                <h1 class="preview-title">Heroic Cobra MP40</h1>
                <div class="preview-price">₹1,250</div>
            </div>

            <div class="preview-specs-list">
                <div class="preview-spec-item">
                    <span class="preview-spec-label">Level</span>
                    <span class="preview-spec-val">63</span>
                </div>
                <div class="preview-spec-item">
                    <span class="preview-spec-label">Rank</span>
                    <span class="preview-spec-val">Heroic II</span>
                </div>
                <div class="preview-spec-item" style="grid-column: span 2;">
                    <span class="preview-spec-label">Skins & Details</span>
                    <span class="preview-spec-val">25+ Gun Skins, 5 Emotes</span>
                </div>
            </div>

            <div class="preview-btns">
                <button id="buyWA" class="btn-main" style="width: 100%; gap: 10px;">
                    <i data-lucide="message-circle" style="width: 18px; height: 18px;"></i>
                    Chat on WhatsApp
                </button>
                <a href="index.html#store" class="btn-outline-dark" style="width: 100%; text-align: center;">
                    Back to Store
                </a>
            </div>
        </div>
    </main>

    <div class="toast-box" id="toastBox"></div>

    <script>
        // Init Lucide
        if (typeof lucide !== 'undefined') lucide.createIcons();

        // Toast helper
        function toast(msg) {
            const box = document.getElementById('toastBox');
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerHTML = `<i data-lucide="check-circle"></i><span>${msg}</span>`;
            box.appendChild(t);
            if (typeof lucide !== 'undefined') lucide.createIcons();
            setTimeout(() => { t.classList.add('out'); setTimeout(() => t.remove(), 300); }, 3000);
        }

        const WA_PHONE = '918102098935';
        const title = "Heroic Cobra MP40";
        const price = "1,250";
        const level = "63";
        const rank = "Heroic II";
        const skins = "25+ Gun Skins, 5 Emotes";
        const image = "assets/cobra.png";
        
        const base = window.location.origin + window.location.pathname.replace(/\/[^/]*$/, '/');
        const orderMsg = `Hello Thilak Store 👋\n\nI want to buy this Free Fire ID.\n\n🆔 Product: ${title}\n💰 Price: ₹${price}\n⭐ Level: ${level}\n🏆 Rank: ${rank}\n🎒 Skins: ${skins}\n\n🖼️ Image: ${base}${image}\n🔗 Product Link: ${window.location.href}\n\nPlease share more details and screenshots.`;

        document.getElementById('buyWA').addEventListener('click', () => {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(orderMsg)
                    .then(() => toast('Details copied! Opening WhatsApp...'))
                    .catch(() => toast('Opening WhatsApp...'));
            }
            setTimeout(() => {
                const url = `https://wa.me/${WA_PHONE}?text=${encodeURIComponent(orderMsg)}`;
                window.open(url, '_blank');
            }, 800);
        });
    </script>
</body>
</html>
